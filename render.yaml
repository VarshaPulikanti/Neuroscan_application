# Free-tier friendly Render config (no paid Postgres)
# Dashboard: New → Web Service → connect this repo
# Or Blueprint with this file (plan: free)

services:
  - type: web
    name: neuroscan-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        value: sqlite:///./data/neuroscan.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: CHECKPOINT_PATH
        value: outputs/checkpoints/best_model.pth
